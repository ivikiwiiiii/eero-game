<!DOCTYPE html>
<html>
<head>
    <title>Eero's Platform Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        canvas.mobile {
            top: 0 !important;
            left: 0 !important;
            transform: none !important;
        }
        /* Mobile touch controls */
        .touch-controls { display: none; position: fixed; z-index: 10; pointer-events: none; }
        .touch-btn {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.6);
            font-family: Arial, sans-serif;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            pointer-events: auto;
            z-index: 20;
        }
        .touch-btn:active, .touch-btn.pressed {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }
        /* D-pad left/right */
        #tb-left { bottom: 25px; left: 20px; width: 64px; height: 64px; font-size: 28px; }
        #tb-right { bottom: 25px; left: 100px; width: 64px; height: 64px; font-size: 28px; }
        /* Jump button */
        #tb-jump { bottom: 25px; right: 20px; width: 72px; height: 72px; font-size: 16px; }
        /* Character switch - above the movement arrows */
        #tb-normal { bottom: 105px; left: 20px; width: 64px; height: 44px; border-radius: 12px; font-size: 12px; background: rgba(68,68,255,0.3); border-color: rgba(68,68,255,0.5); color: rgba(150,150,255,0.8); }
        #tb-spiky { bottom: 105px; left: 100px; width: 64px; height: 44px; border-radius: 12px; font-size: 12px; background: rgba(255,68,68,0.3); border-color: rgba(255,68,68,0.5); color: rgba(255,150,150,0.8); }
        /* Start button for title screen */
        #tb-start { bottom: 50%; left: 50%; transform: translate(-50%, 50%); width: 120px; height: 50px; border-radius: 25px; font-size: 16px; display: none; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- Mobile touch buttons (hidden on desktop) -->
    <div class="touch-controls" id="touchControls">
        <div id="tb-left" class="touch-btn">◀</div>
        <div id="tb-right" class="touch-btn">▶</div>
        <div id="tb-jump" class="touch-btn">JUMP</div>
        <div id="tb-normal" class="touch-btn">NORMAL</div>
        <div id="tb-spiky" class="touch-btn">SPIKY</div>
    </div>
    <div id="tb-start" class="touch-btn">TAP TO START</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const GAME_W = 960;
        const GAME_H = 540;
        const isMobileDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // On mobile: show a zoomed-in viewport that follows the player
        // View width is half the game, so everything is 2x bigger
        const VIEW_W = isMobileDevice ? 420 : GAME_W;
        const VIEW_H = isMobileDevice ? 380 : GAME_H;
        const TITLE_W = isMobileDevice ? 400 : GAME_W;
        const TITLE_H = isMobileDevice ? 700 : GAME_H;

        // Camera position (top-left corner of what we see)
        const cam = { x: 0, y: 0 };
        let gameState = 'title';

        function updateCamera() {
            if (!isMobileDevice) return;
            const targetX = player.x - VIEW_W / 2 + player.width / 2;
            const targetY = player.y - VIEW_H / 2 + player.height / 2;
            cam.x += (targetX - cam.x) * 0.15;
            cam.y += (targetY - cam.y) * 0.15;
            if (cam.x < 0) cam.x = 0;
            if (cam.x > GAME_W - VIEW_W) cam.x = GAME_W - VIEW_W;
            if (cam.y < 0) cam.y = 0;
            if (cam.y > GAME_H - VIEW_H) cam.y = GAME_H - VIEW_H;
        }

        // Set canvas size (only call when state changes, not on resize)
        function setCanvasSize() {
            if (isMobileDevice) {
                if (gameState === 'title') {
                    canvas.width = TITLE_W;
                    canvas.height = TITLE_H;
                } else {
                    canvas.width = VIEW_W;
                    canvas.height = VIEW_H;
                }
            } else {
                canvas.width = GAME_W;
                canvas.height = GAME_H;
            }
        }

        // Scale canvas with CSS only (doesn't clear canvas)
        function fitCanvas() {
            if (isMobileDevice) {
                canvas.classList.add('mobile');
                const cw = canvas.width;
                const ch = canvas.height;
                const scale = Math.min(window.innerWidth / cw, window.innerHeight / ch);
                canvas.style.width = (cw * scale) + 'px';
                canvas.style.height = (ch * scale) + 'px';
            } else {
                const scaleX = window.innerWidth / GAME_W;
                const scaleY = window.innerHeight / GAME_H;
                const scale = Math.min(scaleX, scaleY);
                canvas.style.width = (GAME_W * scale) + 'px';
                canvas.style.height = (GAME_H * scale) + 'px';
            }
        }
        setCanvasSize();
        fitCanvas();
        window.addEventListener('resize', fitCanvas);

        // Player
        const player = {
            x: 50,
            y: 300,
            width: 30,
            height: 30,
            speedX: 0,
            speedY: 0,
            onGround: false,
            jumpsLeft: 2,
            mode: 'normal',
            spikyHits: 0,
            spikyCooldown: 0
        };

        // Controls
        const keys = {};
        let jumpPressed = false;
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });
        window.addEventListener('keyup', e => {
            keys[e.key] = false;
            if (e.key === ' ') jumpPressed = false;
        });
        window.addEventListener('blur', () => {
            for (const key in keys) keys[key] = false;
            jumpPressed = false;
        });

        // Level system
        let level = 1;
        let platforms = [];
        let finish = {};

        // Background colors change every 10 levels
        function getBackground() {
            if (level <= 10) return '#87CEEB';      // Sky blue
            if (level <= 20) return '#FF8C42';      // Sunset orange
            if (level <= 30) return '#1a1a4e';      // Night blue
            if (level <= 40) return '#6B2FA0';      // Purple space
            return '#8B0000';                        // Red volcanic
        }

        // Text color so you can read it on dark backgrounds
        function getTextColor() {
            if (level <= 10) return 'white';
            if (level <= 20) return 'white';
            return '#FFD700';
        }

        function generateLevel() {
            platforms = [];

            // Ground is always there
            platforms.push({ x: 0, y: GAME_H - 40, width: 250, height: 40, hasSpike: false });

            // More platforms as level goes up
            const platCount = 5 + Math.floor(level * 0.6);
            // More spikes as level goes up
            const spikeChance = 0.15 + (level * 0.012);

            // Use a simple random seed based on level so each level is always the same
            let seed = level * 7 + 13;
            function random() {
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                return (seed % 1000) / 1000;
            }

            // Generate platforms spread across the whole screen
            let lastX = 80;
            let lastY = GAME_H - 100;

            for (let i = 0; i < platCount; i++) {
                // Spread platforms evenly across the screen width
                const targetX = ((i + 1) / (platCount + 1)) * (GAME_W - 100) + 30;
                const width = 70 + random() * 70;
                let x = targetX + (random() - 0.5) * 80;
                let y = lastY - (15 + random() * 25);

                // Sometimes go down instead of up to mix it up
                if (random() < 0.3 && y > 150) {
                    y = lastY + 10 + random() * 30;
                }

                // Keep on screen horizontally
                if (x + width > GAME_W - 20) {
                    x = GAME_W - width - 30;
                }
                // Keep on screen vertically
                if (y < 70) {
                    y = 70 + random() * 60;
                }
                if (y > GAME_H - 70) {
                    y = GAME_H - 70;
                }

                const hasSpike = random() < spikeChance;
                platforms.push({ x, y, width, height: 15, hasSpike });

                lastX = x;
                lastY = y;
            }

            // Place finish on the last platform
            const lastPlat = platforms[platforms.length - 1];
            finish = {
                x: lastPlat.x + lastPlat.width / 2 - 10,
                y: lastPlat.y - 40,
                width: 30,
                height: 40
            };
        }

        const startX = 50;
        let startY = 400;

        // Death animation
        let dying = false;
        let deathTimer = 0;
        let deathX = 0;
        let deathY = 0;
        let deathSpeedY = 0;
        let deathSpin = 0;

        function killPlayer() {
            if (dying) return;
            dying = true;
            deathTimer = 90; // 1.5 seconds
            deathX = player.x;
            deathY = player.y;
            deathSpeedY = -8; // fly up first
            deathSpin = 0;
        }

        // Win animation
        let winning = false;
        let winTimer = 0;
        let winX = 0;
        let winY = 0;
        let confetti = [];
        let winBeat = false;

        function startWinAnimation() {
            if (winning || dying) return;
            winning = true;
            winTimer = 150; // 2.5 seconds
            winX = player.x;
            winY = player.y;
            // Create confetti particles
            confetti = [];
            for (let i = 0; i < 60; i++) {
                confetti.push({
                    x: Math.random() * GAME_W,
                    y: -10 - Math.random() * 200,
                    speedX: (Math.random() - 0.5) * 3,
                    speedY: 1 + Math.random() * 3,
                    color: ['#FF0000', '#00FF00', '#0000FF', '#FFD700', '#FF69B4', '#00FFFF'][Math.floor(Math.random() * 6)],
                    size: 4 + Math.random() * 6,
                    spin: Math.random() * 6
                });
            }
        }

        function resetPlayer() {
            startY = GAME_H - 80;
            player.x = startX;
            player.y = startY;
            player.speedX = 0;
            player.speedY = 0;
            player.jumpsLeft = 2;
            player.mode = 'normal';
            player.spikyHits = 0;
            player.spikyCooldown = 0;
        }

        function nextLevel() {
            if (level >= 50) {
                level = 1;
            } else {
                level++;
            }
            generateLevel();
            resetPlayer();
        }

        function update() {
            // Movement
            if (keys['a'] || keys['A']) {
                player.speedX = -3;
            } else if (keys['d'] || keys['D']) {
                player.speedX = 3;
            } else {
                player.speedX = 0;
            }

            // Jump - double jump allowed!
            if (keys[' '] && !jumpPressed && player.jumpsLeft > 0) {
                player.speedY = -10;
                player.onGround = false;
                player.jumpsLeft--;
                jumpPressed = true;
            }

            // Spiky cooldown timer (counts down each frame, 60 frames = 1 second)
            if (player.spikyCooldown > 0) {
                player.spikyCooldown--;
            }

            // Switch character
            if (keys['k'] || keys['K']) {
                player.mode = 'normal';
            }
            if (keys['l'] || keys['L']) {
                if (player.spikyCooldown <= 0) {
                    if (player.mode !== 'spiky') {
                        player.spikyHits = 0;
                    }
                    player.mode = 'spiky';
                }
            }

            // Gravity
            player.speedY += 0.5;

            // Move player
            player.x += player.speedX;
            player.y += player.speedY;

            // Platform collision
            player.onGround = false;
            for (const plat of platforms) {
                if (
                    player.x + player.width > plat.x &&
                    player.x < plat.x + plat.width &&
                    player.y + player.height > plat.y &&
                    player.y + player.height < plat.y + plat.height + 10 &&
                    player.speedY >= 0
                ) {
                    player.y = plat.y - player.height;
                    player.speedY = 0;
                    player.onGround = true;
                    player.jumpsLeft = 2;

                    // Spike check
                    if (plat.hasSpike && player.spikyCooldown <= 0) {
                        if (player.mode === 'spiky' && player.spikyHits === 0) {
                            player.spikyHits = 1;
                            // Bounce off the spike!
                            player.speedY = -8;
                            player.onGround = false;
                            // Switch back to normal and start 5 second cooldown
                            player.mode = 'normal';
                            player.spikyCooldown = 300; // 5 seconds (60 frames per second)
                        } else {
                            killPlayer();
                        }
                    }
                }
            }

            // Fall off screen
            if (player.y > GAME_H + 50) {
                killPlayer();
            }

            // Keep player on screen horizontally
            if (player.x < 0) player.x = 0;
            if (player.x > GAME_W) player.x = GAME_W - player.width;

            // Check finish
            if (
                player.x + player.width > finish.x &&
                player.x < finish.x + finish.width &&
                player.y + player.height > finish.y &&
                player.y < finish.y + finish.height
            ) {
                startWinAnimation();
            }
        }

        function drawPlayer() {
            if (player.mode === 'normal') {
                ctx.fillStyle = '#4444FF';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = 'white';
                ctx.fillRect(player.x + 6, player.y + 8, 6, 6);
                ctx.fillRect(player.x + 18, player.y + 8, 6, 6);
                ctx.fillStyle = 'black';
                ctx.fillRect(player.x + 8, player.y + 10, 3, 3);
                ctx.fillRect(player.x + 20, player.y + 10, 3, 3);
            } else {
                ctx.fillStyle = '#FF4444';
                ctx.fillRect(player.x, player.y + 5, player.width, player.height - 5);
                ctx.fillStyle = '#FF4444';
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(player.x + i * 6, player.y + 5);
                    ctx.lineTo(player.x + i * 6 + 3, player.y - 3);
                    ctx.lineTo(player.x + i * 6 + 6, player.y + 5);
                    ctx.fill();
                }
                ctx.fillStyle = 'white';
                ctx.fillRect(player.x + 6, player.y + 13, 6, 6);
                ctx.fillRect(player.x + 18, player.y + 13, 6, 6);
                ctx.fillStyle = 'black';
                ctx.fillRect(player.x + 8, player.y + 15, 3, 3);
                ctx.fillRect(player.x + 20, player.y + 15, 3, 3);

                if (player.spikyHits === 0) {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(player.x + 15, player.y + 15, 20, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        function drawPlatforms() {
            for (const plat of platforms) {
                ctx.fillStyle = '#654321';
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                ctx.fillStyle = '#228B22';
                ctx.fillRect(plat.x, plat.y, plat.width, 4);

                if (plat.hasSpike) {
                    ctx.fillStyle = '#888888';
                    const spikeCount = Math.floor(plat.width / 15);
                    for (let i = 0; i < spikeCount; i++) {
                        ctx.beginPath();
                        ctx.moveTo(plat.x + i * 15 + 2, plat.y);
                        ctx.lineTo(plat.x + i * 15 + 8, plat.y - 12);
                        ctx.lineTo(plat.x + i * 15 + 14, plat.y);
                        ctx.fill();
                    }
                }
            }
        }

        function drawFinish() {
            ctx.fillStyle = '#333';
            ctx.fillRect(finish.x + 3, finish.y, 4, finish.height);
            ctx.fillStyle = '#FF0000';
            ctx.beginPath();
            ctx.moveTo(finish.x + 7, finish.y);
            ctx.lineTo(finish.x + 30, finish.y + 10);
            ctx.lineTo(finish.x + 7, finish.y + 20);
            ctx.fill();
            ctx.fillStyle = getTextColor();
            ctx.font = 'bold 10px Arial';
            ctx.fillText('FINISH', finish.x - 5, finish.y - 5);
        }

        function drawHUD() {
            const color = getTextColor();
            ctx.fillStyle = color;
            ctx.font = 'bold 20px Arial';
            ctx.fillText('LEVEL ' + level + ' / 50', 10, 28);
            ctx.font = '14px Arial';
            ctx.fillText('Character: ' + player.mode.toUpperCase(), 10, 48);
            if (!isMobileDevice) {
                ctx.fillText('K = Normal | L = Spiky', 10, 66);
            }
            const hudY = isMobileDevice ? 66 : 84;
            if (player.mode === 'spiky') {
                ctx.fillText('Shield: ' + (player.spikyHits === 0 ? 'READY' : 'USED'), 10, hudY);
            }
            if (player.spikyCooldown > 0) {
                ctx.fillStyle = '#FF6666';
                ctx.fillText('Spiky cooldown: ' + Math.ceil(player.spikyCooldown / 60) + 's', 10, hudY + 18);
            }
        }

        function drawDeathAnimation() {
            // Spinning player flying up then falling
            deathSpeedY += 0.3;
            deathY += deathSpeedY;
            deathSpin += 0.15;
            deathTimer--;

            ctx.save();
            ctx.translate(deathX + 15, deathY + 15);
            ctx.rotate(deathSpin);
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(-15, -15, 30, 30);
            // X eyes
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-8, -6); ctx.lineTo(-2, 0);
            ctx.moveTo(-2, -6); ctx.lineTo(-8, 0);
            ctx.moveTo(2, -6); ctx.lineTo(8, 0);
            ctx.moveTo(8, -6); ctx.lineTo(2, 0);
            ctx.stroke();
            ctx.restore();

            // "YOU DIED" text with flashing effect
            if (Math.floor(deathTimer / 8) % 2 === 0) {
                ctx.fillStyle = '#FF0000';
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('YOU DIED!', cam.x + VIEW_W / 2, cam.y + VIEW_H / 2);
                ctx.textAlign = 'left';
            }

            if (deathTimer <= 0) {
                dying = false;
                resetPlayer();
            }
        }

        function drawWinAnimation() {
            winTimer--;

            // Giant dancing character in the center of the screen!
            const bounce = Math.sin(winTimer * 0.3) * 20;
            const lean = Math.sin(winTimer * 0.2) * 0.15;
            const armWave = Math.sin(winTimer * 0.4) * 60;
            const size = 120;

            ctx.save();
            ctx.translate(cam.x + VIEW_W / 2, cam.y + VIEW_H / 2 + 30 + bounce);
            ctx.rotate(lean);

            // Body
            ctx.fillStyle = '#4444FF';
            ctx.fillRect(-size / 2, -size / 2, size, size);

            // Happy eyes (big and round)
            ctx.fillStyle = 'white';
            ctx.fillRect(-size * 0.3, -size * 0.2, size * 0.22, size * 0.22);
            ctx.fillRect(size * 0.08, -size * 0.2, size * 0.22, size * 0.22);
            ctx.fillStyle = 'black';
            ctx.fillRect(-size * 0.24, -size * 0.14, size * 0.12, size * 0.12);
            ctx.fillRect(size * 0.14, -size * 0.14, size * 0.12, size * 0.12);

            // Big smile
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(0, size * 0.1, size * 0.25, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Dancing legs
            const legKick = Math.sin(winTimer * 0.3) * 20;
            ctx.strokeStyle = '#4444FF';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(-size * 0.2, size / 2);
            ctx.lineTo(-size * 0.3, size / 2 + 40 + legKick);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(size * 0.2, size / 2);
            ctx.lineTo(size * 0.3, size / 2 + 40 - legKick);
            ctx.stroke();

            // Dancing arms
            ctx.strokeStyle = '#4444FF';
            ctx.lineWidth = 10;
            // Left arm
            ctx.beginPath();
            ctx.moveTo(-size / 2, -size * 0.1);
            ctx.lineTo(-size / 2 - 40, -size * 0.4 + armWave);
            ctx.stroke();
            // Right arm
            ctx.beginPath();
            ctx.moveTo(size / 2, -size * 0.1);
            ctx.lineTo(size / 2 + 40, -size * 0.4 - armWave);
            ctx.stroke();

            ctx.restore();

            // Confetti falling
            for (const c of confetti) {
                c.x += c.speedX;
                c.y += c.speedY;
                c.spin += 0.1;
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.spin);
                ctx.fillStyle = c.color;
                ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
                ctx.restore();
            }

            // "YOU WIN!" text with rainbow effect
            const colors = ['#FF0000', '#FF8800', '#FFFF00', '#00FF00', '#0088FF', '#8800FF'];
            const colorIndex = Math.floor(winTimer / 5) % colors.length;
            ctx.fillStyle = colors[colorIndex];
            ctx.font = 'bold 55px Arial';
            ctx.textAlign = 'center';
            if (level >= 50) {
                ctx.fillText('CHAMPION!', cam.x + VIEW_W / 2, cam.y + VIEW_H / 2 - 40);
                ctx.font = 'bold 30px Arial';
                ctx.fillText('YOU BEAT ALL 50 LEVELS!', cam.x + VIEW_W / 2, cam.y + VIEW_H / 2 + 10);
            } else {
                ctx.fillText('YOU WIN!', cam.x + VIEW_W / 2, cam.y + VIEW_H / 2 - 20);
                ctx.font = 'bold 25px Arial';
                ctx.fillStyle = 'white';
                ctx.fillText('Level ' + level + ' complete!', cam.x + VIEW_W / 2, cam.y + VIEW_H / 2 + 20);
            }
            ctx.textAlign = 'left';

            if (winTimer <= 0) {
                winning = false;
                nextLevel();
            }
        }

        function gameLoop() {
            if (gameState === 'title') {
                drawTitleScreen();
            } else {
                if (!dying && !winning) update();
                updateCamera();

                // Background fills entire visible area
                ctx.fillStyle = getBackground();
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);


                // Apply camera offset for world drawing
                ctx.save();
                ctx.translate(-cam.x, -cam.y);

                if (dying) {
                    drawPlatforms();
                    drawFinish();
                    drawDeathAnimation();
                } else if (winning) {
                    drawPlatforms();
                    drawFinish();
                    drawWinAnimation();
                } else {
                    drawPlatforms();
                    drawFinish();
                    drawPlayer();
                }

                ctx.restore();

                // HUD drawn without camera offset (stays on screen)
                drawHUD();
            }

            requestAnimationFrame(gameLoop);
        }

        // Game state (gameState declared earlier near fitCanvas)
        let titleTimer = 0;

        // Start game when any key is pressed on title screen
        function startPlaying() {
            gameState = 'playing';
            setCanvasSize();
            fitCanvas();
        }
        window.addEventListener('keydown', function startGame(e) {
            if (gameState === 'title') {
                startPlaying();
            }
        });

        function drawTitleScreen() {
            titleTimer++;
            const tw = canvas.width;
            const th = canvas.height;

            // Background - nice gradient sky
            ctx.fillStyle = '#1a1a4e';
            ctx.fillRect(0, 0, tw, th);

            // Stars twinkling
            for (let i = 0; i < 50; i++) {
                const sx = (i * 137 + 50) % tw;
                const sy = (i * 97 + 30) % (th * 0.6);
                const twinkle = Math.sin(titleTimer * 0.05 + i) * 0.5 + 0.5;
                ctx.fillStyle = 'rgba(255, 255, 255, ' + twinkle + ')';
                ctx.fillRect(sx, sy, 2, 2);
            }

            // Title text with rainbow effect
            const colors = ['#FF0000', '#FF8800', '#FFFF00', '#00FF00', '#0088FF', '#8800FF'];
            const colorIndex = Math.floor(titleTimer / 8) % colors.length;
            ctx.fillStyle = colors[colorIndex];
            ctx.textAlign = 'center';

            if (isMobileDevice) {
                // MOBILE VERTICAL LAYOUT
                ctx.font = 'bold 32px Arial';
                ctx.fillText("Welcome to", tw / 2, 90);
                ctx.fillText("Eero's", tw / 2, 130);
                ctx.font = 'bold 28px Arial';
                ctx.fillText('Platform Game!', tw / 2, 170);

                // Dancing character - bigger on mobile title
                const size = 90;
                const jumpHeight = Math.abs(Math.sin(titleTimer * 0.08)) * 25;
                const jackPhase = Math.sin(titleTimer * 0.15);
                const armAngle = jackPhase * 0.8;
                const legAngle = jackPhase * 0.5;

                ctx.save();
                ctx.translate(tw / 2, 320 - jumpHeight);

                ctx.fillStyle = '#4444FF';
                ctx.fillRect(-size / 2, -size / 2, size, size);
                ctx.fillStyle = 'white';
                ctx.fillRect(-size * 0.3, -size * 0.2, size * 0.22, size * 0.22);
                ctx.fillRect(size * 0.08, -size * 0.2, size * 0.22, size * 0.22);
                ctx.fillStyle = 'black';
                ctx.fillRect(-size * 0.24, -size * 0.14, size * 0.12, size * 0.12);
                ctx.fillRect(size * 0.14, -size * 0.14, size * 0.12, size * 0.12);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, size * 0.1, size * 0.2, 0.1, Math.PI - 0.1);
                ctx.stroke();
                ctx.strokeStyle = '#4444FF';
                ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(-size / 2, 0); ctx.lineTo(-size / 2 - 35, -20 - armAngle * 50); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2 + 35, -20 - armAngle * 50); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-size * 0.15, size / 2); ctx.lineTo(-size * 0.2 - legAngle * 25, size / 2 + 40); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(size * 0.15, size / 2); ctx.lineTo(size * 0.2 + legAngle * 25, size / 2 + 40); ctx.stroke();
                ctx.restore();

                // How to play section
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(20, 400, tw - 40, 170);

                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 20px Arial';
                ctx.fillText('HOW TO PLAY', tw / 2, 430);

                ctx.fillStyle = 'white';
                ctx.font = '15px Arial';
                ctx.fillText('◀ ▶  Move left & right', tw / 2, 460);
                ctx.fillText('JUMP  Jump (you can double jump!)', tw / 2, 485);
                ctx.fillText('NORMAL  Safe character', tw / 2, 510);
                ctx.fillText('SPIKY  Has a shield (blocks 1 spike!)', tw / 2, 535);
                ctx.fillText('Reach the flag to beat each level!', tw / 2, 560);

                // Credit
                ctx.textAlign = 'left';
                ctx.fillStyle = '#888';
                ctx.font = '14px Arial';
                ctx.fillText('Game by Eero Puhakka', 15, th - 15);

            } else {
                // DESKTOP LAYOUT (unchanged)
                ctx.font = 'bold 40px Arial';
                ctx.fillText("Welcome to Eero's", tw / 2, 70);
                ctx.fillText('First Platform Game!', tw / 2, 120);

                // Dancing character
                const size = 80;
                const jumpHeight = Math.abs(Math.sin(titleTimer * 0.08)) * 30;
                const jackPhase = Math.sin(titleTimer * 0.15);
                const armAngle = jackPhase * 0.8;
                const legAngle = jackPhase * 0.5;

                ctx.save();
                ctx.translate(tw / 2, th / 2 + 40 - jumpHeight);

                ctx.fillStyle = '#4444FF';
                ctx.fillRect(-size / 2, -size / 2, size, size);
                ctx.fillStyle = 'white';
                ctx.fillRect(-size * 0.3, -size * 0.2, size * 0.22, size * 0.22);
                ctx.fillRect(size * 0.08, -size * 0.2, size * 0.22, size * 0.22);
                ctx.fillStyle = 'black';
                ctx.fillRect(-size * 0.24, -size * 0.14, size * 0.12, size * 0.12);
                ctx.fillRect(size * 0.14, -size * 0.14, size * 0.12, size * 0.12);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, size * 0.1, size * 0.2, 0.1, Math.PI - 0.1);
                ctx.stroke();
                ctx.strokeStyle = '#4444FF';
                ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(-size / 2, 0); ctx.lineTo(-size / 2 - 35, -20 - armAngle * 50); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2 + 35, -20 - armAngle * 50); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-size * 0.15, size / 2); ctx.lineTo(-size * 0.2 - legAngle * 25, size / 2 + 40); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(size * 0.15, size / 2); ctx.lineTo(size * 0.2 + legAngle * 25, size / 2 + 40); ctx.stroke();
                ctx.restore();

                // Controls box
                const boxX = tw / 2;
                const boxY = th - 140;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(boxX - 200, boxY - 25, 400, 115);

                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('CONTROLS', boxX, boxY);
                ctx.fillStyle = 'white';
                ctx.font = '16px Arial';
                ctx.fillText('A = Move Left    D = Move Right    Space = Jump (x2!)', boxX, boxY + 25);
                ctx.fillText('K = Normal Character    L = Spiky Character (has shield!)', boxX, boxY + 50);
                ctx.fillText('Reach the flag to beat each level. 50 levels total!', boxX, boxY + 75);

                // Press any key prompt
                if (Math.floor(titleTimer / 30) % 2 === 0) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 22px Arial';
                    ctx.fillText('Press any key to start!', tw / 2, th - 15);
                }

                // Credit
                ctx.textAlign = 'left';
                ctx.fillStyle = '#888';
                ctx.font = '18px Arial';
                ctx.fillText('Game by Eero Puhakka', 20, th - 15);
            }
            ctx.textAlign = 'left';
        }

        // === MOBILE TOUCH CONTROLS ===
        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isMobile) {
            document.getElementById('touchControls').style.display = 'block';
            document.getElementById('tb-start').style.display = 'flex';

            function touchBtn(id, keyName, opts) {
                const el = document.getElementById(id);
                if (!el) return;
                const isToggle = opts && opts.toggle;

                el.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    el.classList.add('pressed');
                    keys[keyName] = true;
                    // For jump, simulate keydown (needs jumpPressed logic)
                    if (keyName === ' ' && !jumpPressed) {
                        // jumpPressed is handled in update
                    }
                }, { passive: false });

                el.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    el.classList.remove('pressed');
                    keys[keyName] = false;
                    if (keyName === ' ') jumpPressed = false;
                }, { passive: false });

                // Handle touch moving off the button
                el.addEventListener('touchcancel', function(e) {
                    el.classList.remove('pressed');
                    keys[keyName] = false;
                    if (keyName === ' ') jumpPressed = false;
                });
            }

            touchBtn('tb-left', 'a');
            touchBtn('tb-right', 'd');
            touchBtn('tb-jump', ' ');
            touchBtn('tb-normal', 'k');
            touchBtn('tb-spiky', 'l');

            // Start button for mobile
            const startBtn = document.getElementById('tb-start');
            startBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (gameState === 'title') {
                    startPlaying();
                    startBtn.style.display = 'none';
                }
            }, { passive: false });

            // Also hide start button when game starts via keyboard
            const origKeydown = window.onkeydown;
            window.addEventListener('keydown', function() {
                if (gameState === 'playing') {
                    startBtn.style.display = 'none';
                }
            });

            // Hide game controls on title, show during play
            function updateTouchVisibility() {
                const controls = document.getElementById('touchControls');
                if (gameState === 'title') {
                    controls.style.display = 'none';
                    startBtn.style.display = 'flex';
                } else {
                    controls.style.display = 'block';
                    startBtn.style.display = 'none';
                }
                requestAnimationFrame(updateTouchVisibility);
            }
            updateTouchVisibility();
        }

        // Start the game
        generateLevel();
        resetPlayer();
        gameLoop();
    </script>
</body>
</html>
